services:
   postgres:
     image: postgres:16
     container_name: customer-care-db
     environment:
       POSTGRES_DB: customer_care
       POSTGRES_USER: myuser
       POSTGRES_PASSWORD: mypassword
     ports:
       - "5432:5432"
     volumes:
       - postgres_data:/var/lib/postgresql/data
       - ./customercaredb/init.sql:/docker-entrypoint-initdb.d/init.sql
     healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d customer_care"]
      interval: 5s
      timeout: 5s
      retries: 5

   pgadmin:
    image: dpage/pgadmin4
    container_name: customer-care-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json:ro
      - ./pgpass:/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: